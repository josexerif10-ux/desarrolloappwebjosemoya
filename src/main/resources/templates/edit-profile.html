<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/main.css}" rel="stylesheet"/>
</head>
<body class="d-flex flex-column h-100">

<nav class="navbar navbar-expand navbar-dark bg-dark">
    <div class="container-fluid">
        <h1 class="d-flex align-items-center fs-4 text-white mb-0">
            <img th:src="@{/img/TASKhiveLogo}" width="38" height="30" class="me-3" alt="Logo">
            TaskHive
        </h1>
    </div>
</nav>

<main class="container py-5">
    <div class="card mx-auto" style="max-width: 650px;">
        <div class="card-body">
            <h2 class="mb-4">Editar perfil</h2>

            <form th:action="@{/profile/edit}" method="post" th:object="${profileForm}">
                <div class="mb-3 text-center">
                    <img id="previewAvatar"
                         th:src="*{avatar}"
                         alt="Avatar"
                         style="width:100px; height:100px; object-fit:cover; border-radius:50%;">
                </div>

                <div class="mb-3">
                    <label class="form-label">Nombre completo</label>
                    <input type="text" class="form-control" th:field="*{fullname}">
                    <div class="text-danger" th:if="${#fields.hasErrors('fullname')}" th:errors="*{fullname}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" th:field="*{email}">
                    <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Selecciona tu avatar</label>
                    <select class="form-select" th:field="*{avatar}" id="avatarSelect">
                        <option value="/img/AVATAR.png">Avatar Xixón</option>
                        <option value="/img/AVATARoviedo.png">Avatar OVIEDO</option>
                        <option value="/img/AVATARAviles.png">Avatar Avilés</option>
                        <option value="/img/AVATARLangreo.png">Avatar Langreo</option>
                        <option value="/img/AVATARMC.png">Avatar Mieres del Camín</option>
                        <option value="/img/AVATARCANGASN.png">Avatar Cangas del Narcea</option>
                        <option value="/img/AVATARJARRIO.png">Avatar Jarrio</option>
                        <option value="/img/AVATARCangasdeOnis.png">Avatar Cangas de Onís</option>
                        <option value="/img/AVATARLangreo.png">Avatar Langreo</option>
                        <option value="/img/AVATARhorrible.png">Avatar por defecto</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary">Guardar cambios</button>
                <a class="btn btn-secondary" th:href="@{/profile}">Cancelar</a>
            </form>
        </div>
    </div>
</main>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/profile.js}"></script>
</html>
