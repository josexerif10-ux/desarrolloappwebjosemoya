<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Tasks</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../../static/css/main.css" th:href="@{/css/main.css}" rel="stylesheet" />
  <link th:href="@{/css/admin/admin.css}" rel="stylesheet" />
</head>
<body class="d-flex flex-column h-100">
<nav class="navbar navbar-expand navbar-dark bg-dark">
  <div class="container-fluid">
    <h1 class="d-flex align-items-center fs-4 text-white mb-0">
      <img src="../../static/img/TASKhiveLogo.png" th:src="@{/img/TASKhiveLogo.png}"
           width="38" height="30" class="me-3" alt="Bootstrap">
      TaskHive
    </h1>
    <div class="collapse navbar-collapse navbar-options">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" href="#" th:href="@{/admin/}">Home</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link" href="#" th:href="@{/admin/user}">Users</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link" href="#" th:href="@{/admin/category}">Categories</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link active" href="#" aria-current="page" th:href="@{/admin/task}">Tasks</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link" href="#" th:href="@{/task}">User Tasks</a>
        </li>
      </ul>

      <ul class="navbar-nav ms-auto">
        <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
          <th:block th:with="auth=${#authentication.principal}">
            <a class="nav-link dropdown-toggle d-flex align-items-center"
               href="#"
               id="userDropdown"
               role="button"
               data-bs-toggle="dropdown"
               aria-expanded="false">

              <img th:src="${auth.avatar}"
                   alt="Avatar"
                   CLASS="admin-navbar-avatar">

              <span th:text="${auth.fullname}">User</span>
            </a>
          </th:block>

          <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
            <li><a class="dropdown-item" th:href="@{/profile}">Mi perfil</a></li>
            <li>
              <form class="hidden-form" th:action="@{/logout}" method="POST" id="logoutForm"></form>
              <a class="dropdown-item" href="#" id="logoutLink">Logout</a>
            </li>
          </ul>
        </li>

        <li class="nav-item" sec:authorize="!isAuthenticated()">
          <a class="nav-link" href="#" th:href="@{/login}">Login</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="flex-shrink-0 admin-task-main">
  <div class="container admin-task-container">

    <div class="container admin-empty-list-container" th:if="${param.emptyListError != null}">
      <img src="../static/img/LISTAVACIA.png" th:src="@{/img/LISTAVACIA.png}"
           class="admin-empty-list-image"/>
    </div>

    <table class="table mb-4" th:if="${param.emptyListError == null}">
      <thead>
      <tr>
        <th scope="col">Id.</th>
        <th scope="col">Author</th>
        <th scope="col">Title</th>
        <th scope="col">Description</th>
        <th scope="col">Actions</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="task : ${taskList}" th:classappend="${task.completed} ? 'table-success'">
        <th scope="row" th:text="${task.id}">1</th>
        <td th:text="${task.author.fullname}">Author</td>
        <td th:text="${task.title}">Buy groceries for next week</td>
        <td th:text="${#strings.abbreviate(task.description,50)}">TAREAS</td>
        <td>
          <a href="#" th:href="@{/admin/task/{id}(id=${task.id})}" class="btn btn-primary">View</a>
          <a class="btn btn-danger" th:onclick="|deleteTask(${task.id})|">Delete</a>
          <form class="hidden-form" th:action="@{/admin/task/{id}/del(id=${task.id})}" method="post" th:id="${'delete-task-'+task.id}"></form>
        </td>
      </tr>
      </tbody>
    </table>

  </div>
</main>

<footer class="footer mt-auto py-3 bg-light fixed-bottom">
  <div class="container">
    <input class="form-check-input" type="checkbox" value="" id="flexCheckCheckedDisabled" checked disabled>
    <span class="text-muted">TaskHive - Desarrollo en entorno servidor - JOSÉ ANTONIO MOYA RUIZ</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin/admintasks.js}"></script>
</body>
</html>
