<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edit Task</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../static/css/main.css" th:href="@{/css/main.css}" rel="stylesheet" />
  <link th:href="@{/css/edit-task.css}" rel="stylesheet" />
</head>
<body class="d-flex flex-column h-100">

<nav class="navbar navbar-expand navbar-dark bg-dark">
  <div class="container-fluid">
    <h1 class="d-flex align-items-center fs-4 text-white mb-0">
      <img src="../static/img/TASKhiveLogo.png" th:src="@{/img/TASKhiveLogo.png}"
           width="38" height="30" class="me-3" alt="Bootstrap">
      TaskHive
    </h1>

    <div class="collapse navbar-collapse navbar-options">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" href="#" th:href="@{/}">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="#" th:href="@{/task}">Tasks</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link" href="#" th:href="@{/admin/}">Admin</a>
        </li>
      </ul>

      <ul class="navbar-nav ms-auto">
        <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
          <th:block th:with="auth=${#authentication.principal}">
            <a class="nav-link dropdown-toggle d-flex align-items-center"
               href="#"
               id="userDropdown"
               role="button"
               data-bs-toggle="dropdown"
               aria-expanded="false">

              <img th:src="${auth.avatar}"
                   alt="Avatar"
                   class="edit-task-navbar-avatar">

              <span th:text="${auth.username}">user</span>
            </a>
          </th:block>

          <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
            <li><a class="dropdown-item" th:href="@{/profile}">Mi perfil</a></li>
            <li>
              <form class="logout-form-hidden" th:action="@{/logout}" method="POST" id="logoutForm"></form>
              <a class="dropdown-item" href="#" id="logoutLink">Logout</a>
            </li>
          </ul>
        </li>

        <li class="nav-item" sec:authorize="!isAuthenticated()">
          <a class="nav-link" href="#" th:href="@{/login}">Login</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main>
  <div class="container py-5 h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col">
        <div class="card rounded-3">
          <div class="card-body p-4">
            <form class="row row-cols-lg-auto g-3 justify-content-center align-items-center mb-4 pb-2"
                  action="#" th:action="@{/task/edit/submit}" method="POST" th:object="${task}">
              <h3>Edit task</h3>
              <input type="hidden" th:field="*{id}" />

              <div class="col-12">
                <div class="form-outline">
                  <label class="form-label" for="task-title">Task title</label>
                  <div class="input-group has-validation">
                    <input type="text" id="task-title" class="form-control"
                           th:classappend="${#fields.hasErrors('title')} ? 'is-invalid' : 'is-valid'"
                           th:field="*{title}" aria-describedby="validation-title" required/>
                    <div id="validation-title" class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                  </div>
                </div>
              </div>

              <div class="col-12">
                <div class="form-outline">
                  <label class="form-label" for="task-desc">Description</label>
                  <textarea class="form-control" id="task-desc" rows="3" placeholder="Optional..." th:field="*{description}"></textarea>
                </div>
              </div>

              <div class="col-12">
                <label for="category">Category</label>
                <div class="input-group has-validation">
                  <select id="category" th:field="*{categoryId}" class="form-select"
                          th:classappend="${#fields.hasErrors('categoryId')} ? 'is-invalid' : 'is-valid'"
                          aria-describedby="validation-categoryid">
                    <option value="-1">---</option>
                    <option th:each="category : ${categories}"
                            th:value="${category.id}" th:text="${category.title}">
                      Category
                    </option>
                  </select>
                  <div id="validation-categoryid" class="invalid-feedback" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
                </div>
              </div>

              <div class="col-12">
                <label class="form-label" for="task-tags">Tags</label>
                <input type="text" id="task-tags" class="form-control" th:field="*{tags}" placeholder="tag1, tag2, tag3, ..."/>
              </div>

              <div class="col-12">
                <label class="form-label" for="task-dueDate">Fecha de vencimiento</label>
                <input type="date" id="task-dueDate" class="form-control" th:field="*{dueDate}"/>
              </div>

              <div class="row">
                <div class="col">
                  <label class="form-label" for="task-owner">Owner</label>
                  <input type="text" id="task-owner" class="form-control" th:field="*{username}" disabled="disabled" readonly="readonly" />
                </div>
                <div class="col">
                  <label class="form-label" for="task-createdAt">Created At</label>
                  <input type="text" id="task-createdAt" class="form-control" th:field="*{createdAt}" disabled="disabled" readonly="readonly"/>
                </div>
              </div>

              <div class="col-12">
                <input class="form-check-input" type="checkbox" value="" id="task-completed"
                       th:field="*{completed}">
                <label class="form-check-label" for="task-completed">
                  Completed
                </label>
              </div>

              <div class="col-12">
                <button type="submit" class="btn btn-primary">Edit</button>
                <a href="#" th:href="@{/}" class="btn btn-light float-end">Back</a>
              </div>
            </form>

          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<footer class="footer mt-auto py-3 bg-light fixed-bottom">
  <div class="container">
    <input class="form-check-input" type="checkbox" value="" id="flexCheckCheckedDisabled" checked disabled>
    <span class="text-muted">TaskHive - DESARROLLO EN ENTORNO SERVIDOR - JOSÉ ANTONIO MOYA RUIZ</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/edit-task.js}"></script>
</body>
</html>
